services:
  app:
      build: .
      ports:
        - "8000:8000"
      volumes:
        - .:/app
      environment:
        - DEBUG=1
        - SECRET_KEY=your_secret_key
        - DATABASE_URL=postgres://user:password@db:5432/dbname
      depends_on:
        - db

  db:
    container_name: shopee-food-db
    image: postgres:15-alpine
    restart: on-failure
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: shopee_food
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: